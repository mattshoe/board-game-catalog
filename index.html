<!DOCTYPE html>
<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0"> 

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matt's Board Game Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <span class="header-eyebrow">Matt's Collection</span>
        <h1>Board Game <em>Catalog</em></h1>
      </div>
      <div class="header-meta">
        <span class="game-count">
          <span id="visible-count">119</span><span class="count-total" id="count-total"></span>
          <span class="meta-label">games</span>
        </span>
      </div>
    </div>
  </header>

  <div class="global-search">
    <div class="global-search-inner">
      <input type="text" id="search-input" class="search-input" placeholder="Search games or tags…" />
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <button class="sidebar-toggle" id="sidebar-toggle">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="4" x2="14" y2="4"/><line x1="4" y1="8" x2="14" y2="8"/><line x1="6" y1="12" x2="14" y2="12"/></svg>
        Filters <span id="toggle-count"></span>
        <svg class="toggle-chevron" viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,6 8,10 12,6"/></svg>
      </button>

      <div class="sidebar-content" id="sidebar-content">
        <div class="sidebar-section" id="section-players">
          <label class="sidebar-label">Players</label>
          <div class="range-row">
            <div class="range-track" style="touch-action:none">
              <div class="range-track-bg"></div>
              <div class="range-fill" id="players-fill"></div>
              <input type="range" id="players-slider" min="1" max="12" value="1" />
            </div>
            <span class="mono" id="players-label">Any</span>
          </div>
        </div>

        <div class="sidebar-section" id="section-time">
          <label class="sidebar-label">Play Time</label>
          <div class="range-row">
            <div class="range-track" style="touch-action:none">
              <div class="range-track-bg"></div>
              <div class="range-fill" id="time-fill"></div>
              <input type="range" id="time-slider" min="0" max="4" value="0" />
            </div>
            <span class="mono" id="time-label">Any</span>
          </div>
        </div>

        <div class="sidebar-section" id="section-crunch">
          <label class="sidebar-label">Crunchiness</label>
          <div class="range-row">
            <span class="mono" id="crunch-min-label">1</span>
            <div class="range-track">
              <div class="range-track-bg"></div>
              <div class="range-fill" id="crunch-fill"></div>
              <input type="range" id="crunch-min" min="1" max="10" value="1" />
              <input type="range" id="crunch-max" min="1" max="10" value="10" />
            </div>
            <span class="mono" id="crunch-max-label">10</span>
          </div>
        </div>

        <div class="sidebar-section" id="section-tag">
          <label class="sidebar-label">Tag</label>
          <div class="filter-group" id="tag-filters"></div>
        </div>

        <div class="sidebar-section">
          <label class="sidebar-label">Sort by</label>
          <select id="sort-select" class="sort-select">
            <optgroup label="Name">
              <option value="name-asc">Name A–Z</option>
              <option value="name-desc">Name Z–A</option>
            </optgroup>
            <optgroup label="Players">
              <option value="players-asc">Players ↑</option>
              <option value="players-desc">Players ↓</option>
            </optgroup>
            <optgroup label="Time">
              <option value="time-asc">Time ↑</option>
              <option value="time-desc">Time ↓</option>
            </optgroup>
            <optgroup label="Crunch">
              <option value="crunch-asc">Crunch ↑</option>
              <option value="crunch-desc">Crunch ↓</option>
            </optgroup>
            <optgroup label="BGG Rating">
              <option value="rating-desc">BGG Rating ↓</option>
              <option value="rating-asc">BGG Rating ↑</option>
            </optgroup>
          </select>
        </div>

        <button class="reset-btn" id="reset-btn">Reset Filters</button>
      </div>
    </aside>

    <main class="catalog">
      <div class="catalog-header">
        <div class="ch-spacer"></div>
        <div class="ch-stats">
          <span>Players</span>
          <span>Time</span>
          <span>Crunchiness</span>
          <span>BGG Rating</span>
        </div>
      </div>
      <div class="catalog-grid" id="catalog-grid"></div>
      <div class="empty-state" id="empty-state" style="display:none">
        <span class="empty-die">⚄</span>
        <p>No games match these filters.</p>
        <button onclick="document.getElementById('reset-btn').click()">Clear filters</button>
      </div>
    </main>
  </div>

  <script src="games.js?v=4"></script>
  <script src="app.js"></script>
</body>
</html>
